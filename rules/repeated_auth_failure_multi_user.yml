title: Multiple Failed Logins Across Different Accounts
id: al-013
description: Detects a high volume of failed logins from a single source across the host overall (not filtered to one account) - broader net than the standard brute-force rule, catches distributed attempts against a shared entry point.
severity: high
detection:
  event_type: auth_failure
  group_by: hostname
  threshold: 10
  timeframe_minutes: 10
